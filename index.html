<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#120d08">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Witcher Pet — Baby Geralt</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
:root{
  --bg:#120d08; --panel:#1e1610; --panel2:#2a1f15; --edge:#4a3722;
  --gold:#c9a227; --gold2:#e8c558; --text:#e8dcc8; --dim:#9c8a6e;
  --red:#b03a2e; --green:#5a8f3c; --blue:#3c6e8f; --purple:#7a4a8f;
  --tox:#7fbf3f; --hp:#c0392b; --food:#d35400; --zzz:#5dade2; --joy:#f1c40f; --soap:#85c1e9;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:var(--text);
  font-family:Georgia,'Times New Roman',serif;touch-action:manipulation}
#c3d{position:fixed;inset:0;z-index:0}
/* ---------- HUD ---------- */
#hud{position:fixed;inset:0;z-index:10;pointer-events:none;display:flex;flex-direction:column;
  padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}
#topbar{pointer-events:auto;display:flex;align-items:center;gap:8px;padding:8px 10px;
  background:linear-gradient(180deg,rgba(10,7,4,.92),rgba(10,7,4,.55) 80%,transparent)}
#wolfIcon{width:34px;height:34px;flex:none}
#nameBlock{flex:1;min-width:0}
#petName{font-size:15px;color:var(--gold2);font-weight:bold;letter-spacing:.5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#stageLabel{font-size:11px;color:var(--dim)}
#lvlBadge{text-align:right}
#lvlNum{font-size:14px;color:var(--gold2);font-weight:bold}
#xpBarWrap{width:74px;height:5px;background:#000;border:1px solid var(--edge);border-radius:3px;margin-top:3px}
#xpBar{height:100%;width:0%;background:var(--gold);border-radius:2px;transition:width .4s}
#crowns{display:flex;align-items:center;gap:4px;font-size:14px;color:var(--gold2);margin-left:6px}
#statRow{pointer-events:auto;display:flex;gap:5px;padding:4px 10px 6px;
  background:linear-gradient(180deg,rgba(10,7,4,.55),transparent)}
.stat{flex:1;min-width:0}
.stat .sIcon{font-size:12px;text-align:center;line-height:1}
.sBarWrap{height:7px;background:rgba(0,0,0,.7);border:1px solid var(--edge);border-radius:4px;margin-top:2px;overflow:hidden}
.sBar{height:100%;width:100%;border-radius:3px;transition:width .5s,background .5s}
#spacer{flex:1;pointer-events:none}
/* ---------- log toasts ---------- */
#logArea{pointer-events:none;position:fixed;left:0;right:0;bottom:118px;display:flex;flex-direction:column;
  align-items:center;gap:5px;z-index:11;padding:0 14px}
.toast{background:rgba(18,13,8,.92);border:1px solid var(--edge);color:var(--text);font-size:13px;
  padding:7px 14px;border-radius:8px;max-width:94%;text-align:center;animation:tIn .25s ease-out;box-shadow:0 2px 8px rgba(0,0,0,.6)}
.toast.gold{color:var(--gold2);border-color:var(--gold)}
.toast.bad{color:#e07b6f;border-color:var(--red)}
@keyframes tIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
/* ---------- action bar ---------- */
#actionBar{pointer-events:auto;display:flex;gap:7px;overflow-x:auto;padding:10px 10px calc(12px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,rgba(10,7,4,.95) 60%,transparent);scrollbar-width:none}
#actionBar::-webkit-scrollbar{display:none}
.abtn{flex:none;width:64px;height:72px;background:linear-gradient(180deg,var(--panel2),var(--panel));
  border:1px solid var(--edge);border-radius:10px;color:var(--text);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:4px;font-family:inherit;font-size:10.5px;cursor:pointer;position:relative}
.abtn .em{font-size:24px;line-height:1}
.abtn:active{transform:scale(.94);background:var(--panel2)}
.abtn.locked{opacity:.38;filter:grayscale(.8)}
.abtn .dot{position:absolute;top:5px;right:7px;width:8px;height:8px;border-radius:50%;background:var(--red);
  box-shadow:0 0 6px var(--red);display:none}
/* ---------- modal ---------- */
#modalWrap{position:fixed;inset:0;z-index:50;background:rgba(0,0,0,.72);display:none;
  align-items:flex-end;justify-content:center}
#modalWrap.show{display:flex}
#modal{width:100%;max-width:520px;max-height:86vh;background:linear-gradient(180deg,#241a10,#170f08);
  border:1px solid var(--edge);border-bottom:none;border-radius:18px 18px 0 0;display:flex;flex-direction:column;
  animation:mUp .22s ease-out;padding-bottom:env(safe-area-inset-bottom)}
@keyframes mUp{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
#modalHead{display:flex;align-items:center;padding:14px 16px 10px;border-bottom:1px solid var(--edge)}
#modalTitle{flex:1;font-size:17px;color:var(--gold2);letter-spacing:.5px}
#modalClose{background:none;border:1px solid var(--edge);color:var(--dim);width:30px;height:30px;border-radius:50%;
  font-size:15px;cursor:pointer;font-family:inherit}
#modalBody{overflow-y:auto;padding:12px 14px 18px;font-size:14px;line-height:1.45}
/* shared widgets inside modals */
.card{background:var(--panel);border:1px solid var(--edge);border-radius:10px;padding:10px 12px;margin-bottom:9px}
.rowFlex{display:flex;align-items:center;gap:10px}
.grow{flex:1;min-width:0}
.btn{background:linear-gradient(180deg,#3a2c1a,#2a1f12);border:1px solid var(--gold);color:var(--gold2);
  font-family:inherit;font-size:13px;padding:8px 14px;border-radius:8px;cursor:pointer;white-space:nowrap}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.4;border-color:var(--edge);color:var(--dim)}
.btn.danger{border-color:var(--red);color:#e07b6f}
.btn.small{font-size:12px;padding:5px 10px}
.muted{color:var(--dim);font-size:12px}
.title2{color:var(--gold);font-size:14px;margin:10px 0 6px;letter-spacing:.4px}
.pill{display:inline-block;background:#000;border:1px solid var(--edge);border-radius:20px;
  padding:2px 9px;font-size:11px;color:var(--dim);margin:2px 3px 2px 0}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
/* ---------- story overlay ---------- */
#storyWrap{position:fixed;inset:0;z-index:80;background:rgba(0,0,0,.86);display:none;align-items:center;
  justify-content:center;padding:20px}
#storyWrap.show{display:flex}
#storyBox{max-width:480px;width:100%;background:linear-gradient(180deg,#241a10,#120d08);border:2px solid var(--gold);
  border-radius:14px;padding:22px;box-shadow:0 0 40px rgba(201,162,39,.25);animation:mUp .3s ease-out}
#storyChapter{color:var(--dim);font-size:12px;letter-spacing:2px;text-transform:uppercase;margin-bottom:6px}
#storyTitle{color:var(--gold2);font-size:20px;margin-bottom:12px}
#storyText{font-size:14.5px;line-height:1.6;margin-bottom:18px;color:var(--text)}
#storyBtns{display:flex;flex-direction:column;gap:8px}
/* ---------- combat ---------- */
#combatHud{position:fixed;inset:0;z-index:40;display:none;flex-direction:column;pointer-events:none;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom)}
#combatHud.show{display:flex}
#enemyPlate{pointer-events:auto;margin:10px auto 0;background:rgba(10,7,4,.88);border:1px solid var(--red);
  border-radius:10px;padding:8px 16px;text-align:center;min-width:220px}
#enemyName{color:#e07b6f;font-size:15px;font-weight:bold}
#enemyHpWrap{height:9px;background:#000;border:1px solid var(--edge);border-radius:5px;margin-top:5px;overflow:hidden}
#enemyHp{height:100%;width:100%;background:var(--red);transition:width .4s}
#enemyNote{font-size:11px;color:var(--dim);margin-top:3px}
#combatSpacer{flex:1}
#combatLog{pointer-events:none;text-align:center;font-size:13.5px;color:var(--text);text-shadow:0 1px 3px #000;
  padding:0 16px;margin-bottom:8px;min-height:38px}
#combatBtns{pointer-events:auto;display:flex;gap:7px;overflow-x:auto;padding:8px 10px calc(14px + env(safe-area-inset-bottom));
  background:linear-gradient(0deg,rgba(10,7,4,.95) 60%,transparent);scrollbar-width:none}
#combatBtns::-webkit-scrollbar{display:none}
#playerPlate{pointer-events:none;position:fixed;left:12px;bottom:112px;background:rgba(10,7,4,.85);
  border:1px solid var(--edge);border-radius:9px;padding:6px 12px;font-size:12px}
.shieldTag{color:#f7e08b}
/* ---------- gwent ---------- */
#gwentWrap{position:fixed;inset:0;z-index:60;background:#0d1a0d;display:none;flex-direction:column;
  padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
  background:radial-gradient(ellipse at 50% 30%,#1c2a18,#0b120a)}
#gwentWrap.show{display:flex}
.gSide{flex:1;display:flex;flex-direction:column;justify-content:center;gap:4px;padding:4px 8px;min-height:0}
.gRow{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,.32);border:1px solid #2c3c24;
  border-radius:8px;min-height:46px;padding:3px 6px;overflow-x:auto;scrollbar-width:none}
.gRow::-webkit-scrollbar{display:none}
.gRow.weatherOn{box-shadow:inset 0 0 18px rgba(120,170,255,.35);border-color:#4a6a9a}
.gRowScore{flex:none;width:26px;height:26px;border-radius:50%;background:#000;border:1px solid var(--edge);
  display:flex;align-items:center;justify-content:center;font-size:12px;color:var(--gold2)}
#gMid{flex:none;display:flex;align-items:center;gap:10px;padding:5px 12px;background:rgba(0,0,0,.5);
  border-top:1px solid #2c3c24;border-bottom:1px solid #2c3c24}
#gScores{flex:1;font-size:13px}
#gWeatherZone{display:flex;gap:4px}
#gPassBtn{flex:none}
#gHand{flex:none;display:flex;gap:6px;overflow-x:auto;padding:8px 10px calc(10px + env(safe-area-inset-bottom));
  background:rgba(0,0,0,.55);min-height:96px;scrollbar-width:none}
#gHand::-webkit-scrollbar{display:none}
.gCard{flex:none;width:62px;height:84px;background:linear-gradient(180deg,#2e2418,#1c1208);border:1px solid var(--edge);
  border-radius:7px;display:flex;flex-direction:column;align-items:center;justify-content:space-between;
  padding:5px 3px;cursor:pointer;position:relative}
.gCard.hero{border-color:var(--gold);box-shadow:0 0 8px rgba(201,162,39,.4)}
.gCard.weatherC{border-color:#4a6a9a}
.gCard .gp{font-size:16px;font-weight:bold;color:var(--gold2)}
.gCard .gn{font-size:8.5px;text-align:center;color:var(--text);line-height:1.15}
.gCard .gr{font-size:11px;color:var(--dim)}
.gCard.small{width:38px;height:52px;cursor:default}
.gCard.small .gp{font-size:12px}
.gCard.small .gn{display:none}
.gCard.small .gr{font-size:9px}
.gCard.sel{transform:translateY(-8px);border-color:var(--gold2)}
#gMsg{position:fixed;left:0;right:0;top:42%;text-align:center;z-index:65;pointer-events:none;
  font-size:18px;color:var(--gold2);text-shadow:0 2px 6px #000;opacity:0;transition:opacity .3s}
/* misc */
#nightTint{position:fixed;inset:0;z-index:5;pointer-events:none;background:#0a1430;opacity:0;transition:opacity 2s}
#sleepZ{position:fixed;z-index:12;font-size:26px;color:var(--zzz);pointer-events:none;display:none;
  text-shadow:0 0 8px rgba(93,173,226,.6);animation:zFloat 2.2s infinite ease-in-out}
@keyframes zFloat{0%{transform:translateY(0);opacity:.3}50%{opacity:1}100%{transform:translateY(-26px);opacity:0}}
.invItem{display:flex;align-items:center;gap:9px;padding:7px 4px;border-bottom:1px solid rgba(74,55,34,.5)}
.invItem .em{font-size:22px;width:30px;text-align:center}
input[type=text]{background:#000;border:1px solid var(--edge);color:var(--text);font-family:inherit;
  font-size:15px;padding:9px 12px;border-radius:8px;width:100%}
.choiceBtn{background:linear-gradient(180deg,#3a2c1a,#241a10);border:1px solid var(--gold);color:var(--text);
  font-family:inherit;font-size:14px;padding:11px 14px;border-radius:9px;cursor:pointer;text-align:left;line-height:1.4}
.choiceBtn:active{transform:scale(.97)}
.skillRow{display:flex;align-items:center;gap:8px;padding:8px 4px;border-bottom:1px solid rgba(74,55,34,.5)}
.skillPips{display:flex;gap:3px}
.pip{width:10px;height:10px;border-radius:50%;border:1px solid var(--gold);background:transparent}
.pip.on{background:var(--gold)}
#bootScreen{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column;
  align-items:center;justify-content:center;gap:14px;padding:30px;text-align:center}
#bootScreen h1{color:var(--gold2);font-size:26px;letter-spacing:1px}
#bootScreen .sub{color:var(--dim);font-size:13px;max-width:300px;line-height:1.5}
</style>
</head>
<body>
<canvas id="c3d"></canvas>
<div id="nightTint"></div>
<div id="sleepZ">💤</div>

<div id="hud">
  <div id="topbar">
    <svg id="wolfIcon" viewBox="0 0 64 64"><path fill="#c9a227" d="M32 6 18 16l-8-6 4 16-6 10 12 4 4 14 8-8 8 8 4-14 12-4-6-10 4-16-8 6Zm0 12 8 8-3 10h-10l-3-10Z"/></svg>
    <div id="nameBlock">
      <div id="petName">Geralt</div>
      <div id="stageLabel">Infant · Kaer Morhen</div>
    </div>
    <div id="crowns">🪙<span id="crownNum">0</span></div>
    <div id="lvlBadge">
      <div id="lvlNum">Lv 1</div>
      <div id="xpBarWrap"><div id="xpBar"></div></div>
    </div>
  </div>
  <div id="statRow">
    <div class="stat"><div class="sIcon">❤️</div><div class="sBarWrap"><div class="sBar" id="bHealth" style="background:var(--hp)"></div></div></div>
    <div class="stat"><div class="sIcon">🍗</div><div class="sBarWrap"><div class="sBar" id="bHunger" style="background:var(--food)"></div></div></div>
    <div class="stat"><div class="sIcon">⚡</div><div class="sBarWrap"><div class="sBar" id="bEnergy" style="background:var(--joy)"></div></div></div>
    <div class="stat"><div class="sIcon">😊</div><div class="sBarWrap"><div class="sBar" id="bHappy" style="background:var(--green)"></div></div></div>
    <div class="stat"><div class="sIcon">🧼</div><div class="sBarWrap"><div class="sBar" id="bClean" style="background:var(--soap)"></div></div></div>
    <div class="stat"><div class="sIcon">☠️</div><div class="sBarWrap"><div class="sBar" id="bTox" style="background:var(--tox)"></div></div></div>
  </div>
  <div id="spacer"></div>
  <div id="actionBar"></div>
</div>

<div id="logArea"></div>

<div id="modalWrap"><div id="modal">
  <div id="modalHead"><div id="modalTitle"></div><button id="modalClose">✕</button></div>
  <div id="modalBody"></div>
</div></div>

<div id="storyWrap"><div id="storyBox">
  <div id="storyChapter"></div>
  <div id="storyTitle"></div>
  <div id="storyText"></div>
  <div id="storyBtns"></div>
</div></div>

<div id="combatHud">
  <div id="enemyPlate">
    <div id="enemyName"></div>
    <div id="enemyHpWrap"><div id="enemyHp"></div></div>
    <div id="enemyNote"></div>
  </div>
  <div id="combatSpacer"></div>
  <div id="playerPlate"></div>
  <div id="combatLog"></div>
  <div id="combatBtns"></div>
</div>

<div id="gwentWrap">
  <div class="gSide" id="gFoeSide">
    <div class="gRow" id="gFoeSiege"><div class="gRowScore">0</div></div>
    <div class="gRow" id="gFoeRanged"><div class="gRowScore">0</div></div>
    <div class="gRow" id="gFoeMelee"><div class="gRowScore">0</div></div>
  </div>
  <div id="gMid">
    <div id="gScores"></div>
    <div id="gWeatherZone"></div>
    <button class="btn small" id="gPassBtn">Pass</button>
    <button class="btn small danger" id="gQuitBtn">Forfeit</button>
  </div>
  <div class="gSide" id="gMySide">
    <div class="gRow" id="gMyMelee"><div class="gRowScore">0</div></div>
    <div class="gRow" id="gMyRanged"><div class="gRowScore">0</div></div>
    <div class="gRow" id="gMySiege"><div class="gRowScore">0</div></div>
  </div>
  <div id="gHand"></div>
</div>
<div id="gMsg"></div>

<div id="bootScreen">
  <svg width="84" height="84" viewBox="0 0 64 64"><path fill="#c9a227" d="M32 6 18 16l-8-6 4 16-6 10 12 4 4 14 8-8 8 8 4-14 12-4-6-10 4-16-8 6Zm0 12 8 8-3 10h-10l-3-10Z"/></svg>
  <h1>Witcher Pet</h1>
  <div class="sub" id="bootSub">A white-haired foundling has been left at the gates of Kaer Morhen…</div>
  <div id="bootForm" style="display:none;width:100%;max-width:300px">
    <input type="text" id="nameInput" maxlength="14" placeholder="Name your witcher…" value="Geralt">
    <button class="btn" id="startBtn" style="width:100%;margin-top:12px">Take him in</button>
  </div>
</div>

<script>
"use strict";
/* =====================================================================
   WITCHER PET — Baby Geralt Tamagotchi
   ===================================================================== */
const $=id=>document.getElementById(id);
const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
const rnd=(a,b)=>a+Math.random()*(b-a);
const ri=(a,b)=>Math.floor(rnd(a,b+1));
const pick=a=>a[Math.floor(Math.random()*a.length)];

/* ---------------- DATA ---------------- */
const STAGES=[
 {key:"infant",   name:"Infant",     minDays:0,  scale:0.62},
 {key:"child",    name:"Child",      minDays:1,  scale:0.78},
 {key:"apprentice",name:"Apprentice",minDays:3,  scale:0.92},
 {key:"witcher",  name:"Witcher",    minDays:6,  scale:1.05}
];

const FOODS={
 milk:    {n:"Goat's Milk",e:"🥛",cost:2, hunger:18,happy:4, stages:["infant","child","apprentice","witcher"]},
 porridge:{n:"Porridge",   e:"🥣",cost:3, hunger:28,happy:2, stages:["infant","child","apprentice","witcher"]},
 bread:   {n:"Rye Bread",  e:"🍞",cost:4, hunger:30,happy:3, stages:["child","apprentice","witcher"]},
 apple:   {n:"Apple",      e:"🍎",cost:2, hunger:12,happy:6, stages:["infant","child","apprentice","witcher"]},
 cheese:  {n:"Smoked Cheese",e:"🧀",cost:6,hunger:35,happy:6, stages:["child","apprentice","witcher"]},
 meat:    {n:"Roast Venison",e:"🍖",cost:10,hunger:55,happy:10,stages:["apprentice","witcher"]},
 stew:    {n:"Vesemir's Stew",e:"🍲",cost:8,hunger:50,happy:8, stages:["child","apprentice","witcher"]},
 honey:   {n:"Honeycomb",  e:"🍯",cost:5, hunger:15,happy:14, stages:["infant","child","apprentice","witcher"]}
};

const HERBS={
 celandine:{n:"Celandine",e:"🌼"}, verbena:{n:"Verbena",e:"🌿"},
 wolfsbane:{n:"Wolfsbane",e:"💐"}, mandrake:{n:"Mandrake Root",e:"🥕"},
 whitegull:{n:"White Gull",e:"🍶"}, vitriol:{n:"Vitriol",e:"🧂"},
 drownerbrain:{n:"Drowner Brain",e:"🧠"}, ghoulblood:{n:"Ghoul Blood",e:"🩸"},
 wraithdust:{n:"Wraith Dust",e:"💨"}, wolfheart:{n:"Werewolf Heart",e:"🫀"},
 griffinfeather:{n:"Griffin Feather",e:"🪶"}, leshenresin:{n:"Leshen Resin",e:"🟫"}
};

const POTIONS={
 swallow:    {n:"Swallow",e:"🧪",tox:25,desc:"Restores 45 health.",
              recipe:{celandine:2,drownerbrain:1}},
 cat:        {n:"Cat",e:"🐈",tox:20,desc:"See in the dark — removes night penalty in combat (1 hunt).",
              recipe:{verbena:1,ghoulblood:1}},
 thunderbolt:{n:"Thunderbolt",e:"⚡",tox:35,desc:"+50% sword damage for one hunt.",
              recipe:{wolfsbane:2,vitriol:1}},
 tawnyowl:   {n:"Tawny Owl",e:"🦉",tox:20,desc:"Restores 50 energy.",
              recipe:{verbena:2,mandrake:1}},
 whitehoney: {n:"White Honey",e:"🍯",tox:0,desc:"Purges all toxicity.",
              recipe:{whitegull:1,mandrake:1}},
 fullmoon:   {n:"Full Moon",e:"🌕",tox:30,desc:"+40 max vitality for one hunt.",
              recipe:{wraithdust:1,whitegull:1}}
};

const OILS={
 necro: {n:"Necrophage Oil",e:"🫙",desc:"+40% damage vs drowners, ghouls, rotfiends.",
         recipe:{ghoulblood:1,verbena:2},vs:["drowner","rotfiend","ghoul"]},
 specter:{n:"Specter Oil",e:"⚱️",desc:"+40% damage vs wraiths and night spirits.",
         recipe:{wraithdust:1,vitriol:1},vs:["wraith","noonwraith"]},
 beast: {n:"Beast Oil",e:"🏺",desc:"+40% damage vs wolves and werewolves.",
         recipe:{wolfsbane:1,wolfheart:1},vs:["wolf","werewolf"]},
 hybrid:{n:"Hybrid Oil",e:"🍾",desc:"+40% damage vs griffins and forest fiends.",
         recipe:{griffinfeather:1,vitriol:1},vs:["griffin","leshen","striga"]}

/* ---------------- XP / LEVEL ---------------- */
function xpNeed(l){return Math.floor(40*Math.pow(l,1.45));}
function addXp(n){
 S.xp+=n;
 while(S.xp>=xpNeed(S.lvl)){
   S.xp-=xpNeed(S.lvl);S.lvl++;S.skillPts++;
   toast("⭐ "+S.name+" reached level "+S.lvl+"! +1 skill point","gold");
   geraltEmote("jump");
 }
 refreshHud();
}
function skillRank(k){return S.skills[k]||0;}

/* ---------------- STAT DECAY (per real minute) ---------------- */
const DECAY={hunger:0.21,energy:0.105,happy:0.14,clean:0.07,tox:-0.5};
function applyMinutes(min,offline){
 const st=sHelp.stageKey();
 const mult=st==="infant"?1.25:1;     // babies need more care
 S.hunger=clamp(S.hunger-DECAY.hunger*mult*min,0,100);
 S.clean =clamp(S.clean -DECAY.clean*min,0,100);
 S.tox   =clamp(S.tox   +DECAY.tox*min,0,100);
 if(S.sleeping){
   S.energy=clamp(S.energy+0.5*min,0,100);
   if(S.energy>=100&&!offline){S.sleeping=false;toast(S.name+" wakes up rested.");}
 }else{
   S.energy=clamp(S.energy-DECAY.energy*min,0,100);
   S.happy =clamp(S.happy -DECAY.happy*(offline?0.6:1)*min,0,100);
 }
 // health pressure
 let dh=0;
 if(S.hunger<=5)dh-=0.18*min;
 if(S.clean<=5)dh-=0.06*min;
 if(S.tox>=80)dh-=0.12*min;
 if(S.hunger>40&&S.energy>30&&S.tox<50)dh+=0.08*min; // natural recovery
 S.health=clamp(S.health+dh,1,100);   // never fully dies — witchers are tough
}

/* ---------------- OFFLINE CATCH-UP ---------------- */
function offlineSim(){
 const gone=Math.min(Date.now()-S.last,48*3600000); // cap 48h
 const min=gone/60000;
 if(min<2)return;
 applyMinutes(min,true);
 const hrs=Math.floor(min/60);
 const events=[];
 if(hrs>=1)events.push("While you were away ("+(hrs>0?hrs+"h":Math.floor(min)+"m")+"): ");
 // offline monster raids for post-trial witchers
 if(S.trialDone){
   const raids=Math.min(Math.floor(min/300),4); // every ~5h, max 4
   for(let i=0;i<raids;i++){
     const m=pickMonsterForLevel();
     if(Math.random()<0.45+skillRank("quen")*0.12){
       const c=ri(...MONSTERS[m].crowns);S.crowns+=c;S.kills++;addXp(Math.floor(MONSTERS[m].xp*0.6));
       events.push("⚔️ Fought off a "+MONSTERS[m].n+" (+"+c+" crowns)");
     }else{
       S.health=clamp(S.health-ri(8,18),1,100);
       events.push("🩸 A "+MONSTERS[m].n+" attacked — he was wounded driving it off");
     }
   }
 }
 if(S.hunger<=10)events.push("🍗 He is STARVING.");
 if(S.clean<=10)events.push("🧼 He desperately needs a bath.");
 if(events.length)setTimeout(()=>{events.forEach((e,i)=>setTimeout(()=>toast(e,e.includes("🩸")?"bad":""),i*900));},1200);
}
function pickMonsterForLevel(){
 const ok=Object.keys(MONSTERS).filter(k=>!MONSTERS[k].boss&&MONSTERS[k].lvl<=S.lvl+1);
 return ok.length?ok[ok.length-ri(1,Math.min(3,ok.length))]:"wolf";
}

/* ---------------- MOOD ---------------- */
function mood(){
 if(S.sleeping)return"sleep";
 if(S.health<25)return"hurt";
 if(S.hunger<20)return"hungry";
 if(S.happy<25)return"sad";
 if(S.happy>75&&S.energy>50)return"happy";
 return"calm";
}

let cv,ctx,W,H,DPR,startT=Date.now();
let geralt,monster3d=null,emoteQ=[],blinkT=2;

function lerpHex(a,b,t){
 const ar=(a>>16)&255,ag=(a>>8)&255,ab=a&255,br=(b>>16)&255,bg=(b>>8)&255,bb=b&255;
 return "rgb("+Math.round(ar+(br-ar)*t)+","+Math.round(ag+(bg-ag)*t)+","+Math.round(ab+(bb-ab)*t)+")";
}
function dayFactor(){
 const hr=new Date().getHours()+new Date().getMinutes()/60;
 if(hr>=7&&hr<18)return 1;
 if(hr>=18&&hr<21)return 1-(hr-18)/3;
 if(hr>=5&&hr<7)return (hr-5)/2;
 return 0;
}
function resize2d(){
 DPR=Math.min(devicePixelRatio||1,2);
 W=innerWidth;H=innerHeight;
 cv.width=W*DPR;cv.height=H*DPR;
 cv.style.width=W+"px";cv.style.height=H+"px";
 ctx.setTransform(DPR,0,0,DPR,0,0);
}
function initWorld(){
 cv=$("c3d");ctx=cv.getContext("2d");
 resize2d();addEventListener("resize",resize2d);

 for(let i=0;i<20;i++)sparks2.push({life:Math.random()});

/* ---------- helpers ---------- */
function ink(w){ctx.lineJoin="round";ctx.lineCap="round";ctx.strokeStyle="#15110b";ctx.lineWidth=w;ctx.stroke();}
function fillP(c){ctx.fillStyle=c;ctx.fill();}
function rr(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);
 ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath();}

/* ---------- BACKGROUND ---------- */
function drawBackground(t,dayF){
 // sky gradient
 const top=lerpHex(0x0c1330,0x4c8fd6,dayF), mid=lerpHex(0x241b3a,0x9fd0f2,dayF);
 let horizon=lerpHex(0x3a2740,0xe9d2a8,Math.min(1,dayF*1.3));
 if(dayF>0.05&&dayF<0.55)horizon=lerpHex(horizon.startsWith("rgb")?0x000000:0,0xf0a36a,0.5); // dusk warmth handled below
 const g=ctx.createLinearGradient(0,0,0,H*0.72);
 g.addColorStop(0,top);g.addColorStop(0.55,mid);g.addColorStop(1,horizon);
 ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
 // stars
 if(dayF<0.6){ctx.fillStyle="#eaf0ff";
   stars2.forEach(s=>{const a=(1-dayF)*(0.4+0.6*Math.abs(Math.sin(t*1.3+s.tw)));
     ctx.globalAlpha=a;ctx.beginPath();ctx.arc(s.x*W,s.y*H*0.7,s.x*0+1.2,0,7);ctx.fill();});
   ctx.globalAlpha=1;}
 // sun / moon
 const hr=new Date().getHours()+new Date().getMinutes()/60;
 const sa=((hr-6)/12)*Math.PI, sx=W*0.5-Math.cos(sa)*W*0.55, sy=H*0.62-Math.sin(sa)*H*0.5;
 if(dayF>0.1){
   const sun=ctx.createRadialGradient(sx,sy,4,sx,sy,80);
   sun.addColorStop(0,"rgba(255,247,214,0.95)");sun.addColorStop(1,"rgba(255,230,160,0)");
   ctx.fillStyle=sun;ctx.beginPath();ctx.arc(sx,sy,80,0,7);ctx.fill();
   ctx.fillStyle="#fff3c4";ctx.beginPath();ctx.arc(sx,sy,26,0,7);ctx.fill();
 }else{
   const mx=W*0.72,my=H*0.2;
   ctx.fillStyle="#e7edfb";ctx.beginPath();ctx.arc(mx,my,22,0,7);ctx.fill();
   ctx.fillStyle=mid;ctx.beginPath();ctx.arc(mx+9,my-6,20,0,7);ctx.fill();
 }
 // far mountains
 const mh=H*0.5;
 ctx.fillStyle=lerpHex(0x2a3350,0x8fa6c8,dayF);
 ctx.beginPath();ctx.moveTo(0,mh+60);
 const peaks=[[0,40],[0.15,-30],[0.3,30],[0.46,-50],[0.62,10],[0.78,-40],[0.92,20],[1,50]];
 peaks.forEach(p=>ctx.lineTo(p[0]*W,mh+p[1]));
 ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();
 // snow caps
 ctx.fillStyle=lerpHex(0xaeb9d8,0xffffff,dayF);
 [[0.15,-30],[0.46,-50],[0.78,-40]].forEach(p=>{
   ctx.beginPath();ctx.moveTo(p[0]*W-26,mh+p[1]+30);ctx.lineTo(p[0]*W,mh+p[1]);ctx.lineTo(p[0]*W+26,mh+p[1]+30);
   ctx.quadraticCurveTo(p[0]*W,mh+p[1]+18,p[0]*W-26,mh+p[1]+30);ctx.fill();});
 // Kaer Morhen keep silhouette
 drawKeep(dayF);
 // tree line
 ctx.fillStyle=lerpHex(0x10210f,0x244a1c,dayF);
 const ty=H*0.66;
 for(let x=-20;x<W+20;x+=46){
   const th=34+((x*7)%20);
   ctx.beginPath();ctx.moveTo(x,ty+10);ctx.lineTo(x+18,ty-th);ctx.lineTo(x+36,ty+10);ctx.closePath();ctx.fill();
 }
 // ground
 const gg=ctx.createLinearGradient(0,H*0.7,0,H);
 gg.addColorStop(0,lerpHex(0x24351a,0x4f8a39,dayF));
 gg.addColorStop(1,lerpHex(0x16240f,0x35621f,dayF));

 [-1,1].forEach(d=>{ctx.beginPath();ctx.moveTo(d*22,-6);ctx.quadraticCurveTo(d*46,8,d*40,34);
   ctx.lineWidth=10;ctx.strokeStyle=col;ctx.stroke();
   if(!ghost){ctx.strokeStyle="#15110b";ctx.lineWidth=2;ctx.stroke();}});
 // species extras
 if(monster3d.key==="griffin"){ctx.fillStyle=col;[-1,1].forEach(d=>{ctx.beginPath();
   ctx.moveTo(d*16,-20);ctx.quadraticCurveTo(d*70,-30,d*54,16);ctx.quadraticCurveTo(d*30,-2,d*16,2);ctx.closePath();fillP(col);ink(2);});}
 if(monster3d.key==="leshen"){ctx.strokeStyle="#241c10";ctx.lineWidth=3;
   [-1,1].forEach(d=>{ctx.beginPath();ctx.moveTo(d*8,-54);ctx.lineTo(d*20,-78);ctx.moveTo(d*14,-66);ctx.lineTo(d*30,-70);ctx.stroke();});}
 // glowing eyes
 ctx.globalAlpha=al;ctx.fillStyle=ghost?"#bfe0ff":"#ff3a2a";
 [-7,7].forEach(dx=>{ctx.beginPath();ctx.arc(dx,-42,3.4,0,7);ctx.fill();});
 ctx.save();ctx.globalAlpha=al*0.6;ctx.fillStyle=ghost?"#bfe0ff":"#ff5a3a";
 [-7,7].forEach(dx=>{ctx.beginPath();ctx.arc(dx,-42,6,0,7);ctx.fill();});ctx.restore();
 ctx.restore();
}

/* ---------- weather particles ---------- */
function drawWeather(t,dayF){
 ctx.fillStyle="rgba(255,255,255,0.8)";
 snow2.forEach(p=>{p.y+=p.sp/H*4;p.x+=Math.sin(t*0.8+p.ph)*0.0006+p.dr/W;
   if(p.y>1){p.y=0;p.x=Math.random();}
   ctx.globalAlpha=0.7;ctx.beginPath();ctx.arc(p.x*W,p.y*H,p.s,0,7);ctx.fill();});
 ctx.globalAlpha=1;
 if(dayF<0.45){ctx.fillStyle="#bff09a";
   flies2.forEach(f=>{const a=(1-dayF)*(0.4+Math.sin(t*2.2+f.ph)*0.4);
     const x=(f.x+Math.sin(t*0.5+f.ph)*0.02)*W,y=(f.y+Math.cos(t*0.7+f.ph)*0.02)*H;
     ctx.globalAlpha=Math.max(0,a);ctx.beginPath();ctx.arc(x,y,2.2,0,7);ctx.fill();
     ctx.globalAlpha=Math.max(0,a)*0.4;ctx.beginPath();ctx.arc(x,y,5,0,7);ctx.fill();});
   ctx.globalAlpha=1;}
}

/* ---------- MAIN LOOP ---------- */
function loop(){
 requestAnimationFrame(loop);
 if(!ctx)return;
 const t=(Date.now()-startT)/1000, dayF=dayFactor();
 blinkT-=0.016;if(blinkT<=0)blinkT=rnd(1.8,4.6);
 ctx.clearRect(0,0,W,H);
 if(!S){drawBackground(t,dayF);drawFire(t,dayF);drawWeather(t,dayF);return;}
 drawBackground(t,dayF);
 if(!inCombat)drawFire(t,dayF);
 if(inCombat&&monster3d)drawMonster(t);
 drawGeralt(t,dayF);
 drawWeather(t,dayF);
 $("nightTint").style.opacity=(1-dayF)*0.18;
 // periodic game tick (every ~5s)
 if(Date.now()-lastTickReal>5000){
   const min=(Date.now()-lastTickReal)/60000;lastTickReal=Date.now();
   if(!inCombat&&!inGwent){applyMinutes(min,false);maybeRandomEvent();
     if(Date.now()-S.stipendAt>20*60000){S.stipendAt=Date.now();S.crowns+=ri(3,6);}}
   refreshHud();save();checkStory();
 }
}
let lastTickReal=Date.now();

/* tap to pet */
function onTap(ev){
 if(inCombat||inGwent||!S)return;
 const x=ev.clientX,y=ev.clientY;
 if(x>W*0.5-90&&x<W*0.5+90&&y>H*0.55){
   if(S.sleeping){toast("Shh — he's sleeping.");return;}
   if(Date.now()-lastPet>3000){lastPet=Date.now();S.happy=clamp(S.happy+3,0,100);geraltEmote("jump");
     toast(pick(["He giggles.","Hmm.","He grabs your finger.","A rare little smile.","«Wind's howling…» he mumbles."]));refreshHud();}
   else geraltEmote("spin");
 }
}

window.startCombat=function(key,contractPay){
 if(S.energy<20){toast("Too exhausted to fight — rest first.","bad");return;}
 if(S.health<25){toast("He's too wounded. Heal him first (Swallow potion or rest).","bad");return;}
 closeModal();
 const m=MONSTERS[key];
 const hr=new Date().getHours();
 const night=(hr>=20||hr<6)&&!S.buffs.cat;
 C={key,m,contractPay:contractPay||0,
   ehp:m.hp, ehpMax:m.hp,
   php:S.health+(S.buffs.fullmoon?40:0), phpMax:100+(S.buffs.fullmoon?40:0),
   stam:100, shield:0, stunned:false, night, over:false, turn:1};
 inCombat=true;
 monster3d=buildMonster(key);scene.add(monster3d);
 geralt.grp.position.set(0,0,1.2);
 $("combatHud").classList.add("show");
 $("enemyName").textContent=m.e+" "+m.n;
 $("enemyNote").textContent=(night?"🌙 Night — its strikes hit harder. ":"")+"Weak to "+SKILLS[m.sign].n;
 cLog("A "+m.n.toLowerCase()+" emerges! "+(night?"Darkness favours the beast…":"Steel yourself."));
 buildCombatBtns();updateCombatHud();
};
function cLog(t){$("combatLog").textContent=t;}
function updateCombatHud(){
 $("enemyHp").style.width=Math.max(0,C.ehp/C.ehpMax*100)+"%";
 $("playerPlate").innerHTML="❤️ "+Math.max(0,Math.round(C.php))+"/"+C.phpMax+
   " · 💨 stamina "+Math.round(C.stam)+(C.shield>0?' · <span class="shieldTag">🛡️ Quen '+C.shield+'</span>':"");
}
function buildCombatBtns(){
 const bar=$("combatBtns");bar.innerHTML="";
 const mk=(em,label,fn,dis)=>{
   const b=document.createElement("button");
   b.className="abtn"+(dis?" locked":"");b.style.width="70px";
   b.innerHTML='<div class="em">'+em+'</div><div>'+label+'</div><div class="dot"></div>';
   b.onclick=()=>{if(dis){toast("Can't do that now.");return;}fn();};
   bar.appendChild(b);
 };
 mk("⚔️","Silver",()=>playerAttack());
 ["igni","aard","quen","yrden"].forEach(sg=>{
   const r=skillRank(sg);
   mk(SKILLS[sg].e,SKILLS[sg].n+(r?" "+r:""),()=>castSign(sg),r===0||C.stam<30);
 });
 mk("🤸","Dodge",()=>playerDodge());
 mk("🧪","Potion",()=>combatPotion());
 mk("🏃","Flee",()=>fleeCombat());
}
function dmgMult(){
 let m=1+skillRank("strength")*0.15;
 if(S.buffs.thunder)m*=1.5;
 if(S.activeOil&&OILS[S.activeOil]&&OILS[S.activeOil].vs.includes(C.key))m*=1.4;
 return m;
}
function playerAttack(){
 if(C.over)return;
 const base=8+S.lvl*2.2;
 let d=Math.round(base*dmgMult()*rnd(0.85,1.2));
 const crit=Math.random()<0.12;if(crit)d=Math.round(d*1.8);
 C.ehp-=d;C.stam=clamp(C.stam+15,0,100);
 geraltEmote("shake");monsterHitFlash();
 cLog("⚔️ Silver bites deep — "+d+" damage"+(crit?" (CRIT!)":"")+".");
 afterPlayerAction();
}
function castSign(sg){
 if(C.over)return;
 const r=skillRank(sg);if(!r||C.stam<30)return;
 C.stam-=30;
 const weak=C.m.sign===sg?1.6:1;
 if(sg==="igni"){
   const d=Math.round((10+r*8)*weak*rnd(0.9,1.15));C.ehp-=d;
   cLog("🔥 Igni! Flames wash over it — "+d+" damage.");monsterHitFlash();
 }else if(sg==="aard"){
   const d=Math.round((6+r*5)*weak);C.ehp-=d;
   if(Math.random()<0.35+r*0.15){C.stunned=true;cLog("💨 Aard! "+d+" damage — the beast is knocked sprawling (stunned)!");}
   else cLog("💨 Aard! "+d+" damage.");
   monsterHitFlash();
 }else if(sg==="quen"){
   C.shield=20+r*15;cLog("🛡️ Quen shimmers gold around him — next "+C.shield+" damage absorbed.");
 }else if(sg==="yrden"){
   const d=Math.round((8+r*6)*weak);C.ehp-=d;C.m._slowed=true;
   cLog("🟣 Yrden traps it in violet glyphs — "+d+" damage, its attacks weaken.");monsterHitFlash();
 }
 afterPlayerAction();
}
function playerDodge(){
 if(C.over)return;
 C._dodging=true;C.stam=clamp(C.stam+25,0,100);
 cLog("🤸 He pirouettes clear, watching for an opening…");
 afterPlayerAction();
}
function combatPotion(){
 const pots=Object.keys(S.inv.potions).filter(k=>S.inv.potions[k]>0);
 if(!pots.length){cLog("No potions in the bag! Brew some at the Alchemy lab.");return;}
 // priority: swallow (heal) > whitehoney (purge) > thunderbolt > first available
 const k=pots.find(p=>p==="swallow")||pots.find(p=>p==="whitehoney")||
         pots.find(p=>p==="thunderbolt")||pots[0];
 if(drinkPotion(k,false)){
   if(k==="swallow")C.php=clamp(C.php+45,0,C.phpMax);
   cLog("🧪 He downs a "+POTIONS[k].n+" mid-fight.");
   afterPlayerAction();
 }
}
function fleeCombat(){
 if(Math.random()<0.65){endCombat(false,true);}
 else{cLog("It cuts off his escape!");enemyTurn();}
}
function monsterHitFlash(){
 if(!monster3d)return;
 monster3d.userData.flash=1;
 setTimeout(()=>{try{monster3d.userData.flash=0;}catch(e){}},160);
}
function afterPlayerAction(){
 updateCombatHud();
 if(C.ehp<=0){endCombat(true);return;}
 setTimeout(enemyTurn,750);
}
function enemyTurn(){
 if(!C||C.over)return;
 if(C.stunned){C.stunned=false;cLog(C.m.n+" struggles back to its feet…");updateCombatHud();return;}
 if(monster3d){monster3d.userData.lunge=true;monster3d.userData.lt=0;}
 setTimeout(()=>{
   if(!C||C.over)return;
   let atk=C.m.atk*(C.night?1.3:1)*(C.m._slowed?0.7:1)*rnd(0.8,1.2);
   const dodgeCh=0.08+skillRank("reflex")*0.08+(C._dodging?0.45:0);
   C._dodging=false;
   if(Math.random()<dodgeCh){cLog("🤸 He slips aside — the blow whistles past!");}
   else{
     atk=Math.round(atk);
     if(C.shield>0){const ab=Math.min(C.shield,atk);C.shield-=ab;atk-=ab;
       if(ab>0)cLog("🛡️ Quen takes "+ab+" damage"+(atk>0?" — "+atk+" gets through!":" and holds!"));}
     if(atk>0){C.php-=atk;geraltEmote("shake");
       cLog("🩸 The "+C.m.n.toLowerCase()+" strikes — "+atk+" damage!");}
   }
   C.stam=clamp(C.stam+10,0,100);C.turn++;
   updateCombatHud();
   if(C.php<=0)endCombat(false);
 },520);
}
function endCombat(won,fled){
 C.over=true;
 const m=C.m,key=C.key;
 if(won){
   if(monster3d)monster3d.userData.dying=true;
   const c=ri(...m.crowns)+(C.contractPay||0);
   S.crowns+=c;S.kills++;
   m.loot.forEach(l=>{if(Math.random()<0.8){S.inv.herbs[l]=(S.inv.herbs[l]||0)+1;
     toast("Loot: "+HERBS[l].e+" "+HERBS[l].n);}});
   addXp(m.xp);
   S.health=clamp(C.php,1,100);
   if(m.boss){S.strigaDone=true;}
   cLog("☠️ The "+m.n.toLowerCase()+" falls! +"+c+" crowns, +"+m.xp+" XP");
   toast("🏆 "+m.n+" slain! +"+c+" crowns","gold");
   geraltEmote("jump");
 }else if(fled){
   S.health=clamp(C.php,1,100);
   cLog("He retreats, living to fight another day.");
   toast("Fled the fight. No shame in it — Vesemir taught him that.");
 }else{
   S.health=8;S.happy=clamp(S.happy-20,0,100);
   cLog("🩸 He goes down… but witchers are hard to kill.");
   toast("He was carried back to the keep, badly wounded. Let him rest.","bad");
   geraltEmote("shake");
 }
 S.buffs={};S.activeOil=null;S.energy=clamp(S.energy-15,0,100);S.clean=clamp(S.clean-12,0,100);
 setTimeout(()=>{
   inCombat=false;
   $("combatHud").classList.remove("show");
   if(monster3d){scene.remove(monster3d);monster3d=null;}
   C=null;refreshHud();save();checkStory();
 },won?2000:1600);
}

function openGwentMenu(){

 });

window.startGwent=function(fi){
 closeModal();
 const foe=GWENT_FOES[fi];
 const myPool=S.deck.map(id=>GWENT_ALL.find(c=>c.id===id)).filter(Boolean);
 const myHand=myPool.slice().sort(()=>Math.random()-0.5).slice(0,8);
 const foePool=GWENT_ALL.filter(c=>!c.hero||Math.random()<foe.diff-0.7);
 const foeHand=[];
 for(let i=0;i<8;i++){
   const c=Object.assign({},pick(foePool));
   if(c.row!=="w")c.p=Math.max(1,Math.round(c.p*foe.diff*rnd(0.8,1.1)));
   foeHand.push(c);
 }
 GW={foe,myHand,foeHand,
   rows:{myM:[],myR:[],myS:[],foeM:[],foeR:[],foeS:[]},
   weather:{m:false,r:false,s:false},
   myPassed:false,foePassed:false,
   myWins:0,foeWins:0,round:1,myTurn:true,busy:false,sel:-1};
 inGwent=true;
 $("gwentWrap").classList.add("show");
 gMsgShow("Round 1 — your move");
 renderGwent();
};
function rowPower(cards,wOn){
 return cards.reduce((s,c)=>s+(c.hero?c.p:(wOn?1:c.p)),0);
}
function sideTotal(side){
 const r=GW.rows;
 return rowPower(r[side+"M"],GW.weather.m)+rowPower(r[side+"R"],GW.weather.r)+rowPower(r[side+"S"],GW.weather.s);
}
function gMsgShow(t,long){
 const el=$("gMsg");el.textContent=t;el.style.opacity=1;
 clearTimeout(el._t);el._t=setTimeout(()=>{el.style.opacity=0;},long?2600:1500);
}
function cardEl(c,small,idx){
 const d=document.createElement("div");
 d.className="gCard"+(small?" small":"")+(c.hero?" hero":"")+(c.row==="w"?" weatherC":"");
 const rowLab=c.row==="m"?"⚔":c.row==="r"?"🏹":c.row==="s"?"💣":(c.scorch?"🔥":"☁");
 d.innerHTML='<div class="gp">'+(c.row==="w"?(c.scorch?"🔥":"☁"):c.p)+'</div>'+
   '<div class="gn">'+c.n+'</div><div class="gr">'+rowLab+'</div>';
 if(idx!=null)d.onclick=()=>selectCard(idx);
 return d;
}
function renderGwent(){
 const r=GW.rows;
 const fill=(id,cards,wKey)=>{
   const el=$(id);
   el.classList.toggle("weatherOn",wKey?GW.weather[wKey]:false);
   el.innerHTML='<div class="gRowScore">'+rowPower(cards,wKey?GW.weather[wKey]:false)+'</div>';
   cards.forEach(c=>el.appendChild(cardEl(c,true)));
 };
 fill("gFoeSiege",r.foeS,"s");fill("gFoeRanged",r.foeR,"r");fill("gFoeMelee",r.foeM,"m");
 fill("gMyMelee",r.myM,"m");fill("gMyRanged",r.myR,"r");fill("gMySiege",r.myS,"s");
 const my=sideTotal("my"),foe=sideTotal("foe");
 $("gScores").innerHTML='You <b style="color:'+(my>=foe?'var(--gold2)':'var(--text)')+'">'+my+'</b> · '+
   GW.foe.n+' <b style="color:'+(foe>my?'#e07b6f':'var(--text)')+'">'+foe+'</b>'+
   '<div class="muted" style="font-size:11px">Round '+GW.round+' · You '+GW.myWins+'–'+GW.foeWins+' them'+
   (GW.foePassed?' · they passed':'')+'</div>';
 const wz=$("gWeatherZone");wz.innerHTML="";
 [["m","❄️"],["r","🌫️"],["s","🌧️"]].forEach(w=>{
   if(GW.weather[w[0]]){const s=document.createElement("span");s.textContent=w[1];s.style.fontSize="18px";wz.appendChild(s);}
 });
 const hand=$("gHand");hand.innerHTML="";
 GW.myHand.forEach((c,i)=>{
   const el=cardEl(c,false,i);
   if(i===GW.sel)el.classList.add("sel");
   hand.appendChild(el);
 });
 if(!GW.myHand.length&&!GW.myPassed&&GW.myTurn){doPass(true);}
}
function selectCard(i){
 if(!GW.myTurn||GW.busy||GW.myPassed)return;
 if(GW.sel===i){playCard("my",GW.myHand.splice(i,1)[0]);GW.sel=-1;afterMyMove();}
 else{GW.sel=i;renderGwent();gMsgShow(GW.myHand[i].row==="w"?"Tap again to play":"Tap again to confirm",false);}
}
function playCard(side,c){
 if(c.row==="w"){
   if(c.scorch){
     const foeSide=side==="my"?"foe":"my";
     const all=[].concat(GW.rows[foeSide+"M"],GW.rows[foeSide+"R"],GW.rows[foeSide+"S"]).filter(x=>!x.hero);
     if(all.length){
       const max=Math.max(...all.map(x=>x.p));
       ["M","R","S"].forEach(rw=>{GW.rows[foeSide+rw]=GW.rows[foeSide+rw].filter(x=>x.hero||x.p<max);});
       gMsgShow("🔥 Scorch! Strongest enemy unit destroyed");
     }else gMsgShow("Scorch fizzles — nothing to burn");
   }else if(c.weather==="clear"){GW.weather={m:false,r:false,s:false};gMsgShow("☀️ Skies clear");}
   else{GW.weather[c.weather]=true;gMsgShow(c.n+"!");}
 }else{
   const rw=c.row==="m"?"M":c.row==="r"?"R":"S";
   GW.rows[side+rw].push(c);
 }
}
function afterMyMove(){
 GW.myTurn=false;GW.busy=true;renderGwent();
 setTimeout(foeMove,900);
}
$("gPassBtn").onclick=()=>{if(GW&&GW.myTurn&&!GW.busy)doPass(false);};
$("gQuitBtn").onclick=()=>{if(GW&&confirm("Forfeit the match?"))endGwent(false,true);};
function doPass(auto){
 GW.myPassed=true;GW.myTurn=false;GW.busy=true;
 gMsgShow(auto?"Out of cards — you pass":"You pass");
 renderGwent();
 setTimeout(foeMove,900);
}
function foeMove(){
 if(!GW)return;
 if(GW.foePassed){GW.busy=false;GW.myTurn=true;checkRoundEnd();renderGwent();return;}
 const my=sideTotal("my"),foe=sideTotal("foe");
 // pass logic
 if(!GW.foeHand.length||
    (GW.myPassed&&foe>my)||
    (GW.myPassed&&!GW.foeHand.length)||
    (!GW.myPassed&&foe-my>14&&Math.random()<0.5&&GW.round<3)){
   GW.foePassed=true;gMsgShow(GW.foe.n+" passes");
   GW.busy=false;GW.myTurn=true;checkRoundEnd();renderGwent();return;
 }
 // choose a card
 let idx=-1;
 const units=GW.foeHand.map((c,i)=>({c,i})).filter(x=>x.c.row!=="w");
 const weathers=GW.foeHand.map((c,i)=>({c,i})).filter(x=>x.c.row==="w");
 // smart-ish: scorch if player has big unit
 const myAll=[].concat(GW.rows.myM,GW.rows.myR,GW.rows.myS).filter(x=>!x.hero);
 const sc=weathers.find(w=>w.c.scorch);
 if(sc&&myAll.length&&Math.max(...myAll.map(x=>x.p))>=8)idx=sc.i;
 else if(weathers.length&&!weathers[0].c.scorch&&weathers[0].c.weather!=="clear"&&Math.random()<0.3&&my>foe)idx=weathers[0].i;
 else if(units.length){
   units.sort((a,b)=>a.c.p-b.c.p);
   idx=(foe<=my)?units[units.length-1].i:units[0].i; // behind: strongest; ahead: weakest
 }else idx=weathers.length?weathers[0].i:-1;
 if(idx<0){GW.foePassed=true;gMsgShow(GW.foe.n+" passes");}
 else{
   const c=GW.foeHand.splice(idx,1)[0];
   playCard("foe",c);
   if(c.row!=="w")gMsgShow(GW.foe.n+" plays "+c.n+" ("+c.p+")");
 }
 GW.busy=false;GW.myTurn=!GW.myPassed;
 if(GW.myPassed&&!GW.foePassed){renderGwent();setTimeout(foeMove,1000);return;}
 checkRoundEnd();renderGwent();
}
function checkRoundEnd(){
 if(!GW.myPassed||!GW.foePassed)return;
 const my=sideTotal("my"),foe=sideTotal("foe");
 let msg;
 if(my>foe){GW.myWins++;msg="🏆 You take round "+GW.round;}
 else if(foe>my){GW.foeWins++;msg=GW.foe.n+" takes round "+GW.round;}
 else{GW.myWins++;GW.foeWins++;msg="Round "+GW.round+" drawn — both take it";}
 gMsgShow(msg,true);
 if(GW.myWins>=2&&GW.foeWins>=2)return setTimeout(()=>endGwent(GW.myWins>=GW.foeWins,false),1800);
 if(GW.myWins>=2)return setTimeout(()=>endGwent(true,false),1800);
 if(GW.foeWins>=2)return setTimeout(()=>endGwent(false,false),1800);
 // next round
 GW.round++;
 setTimeout(()=>{
   GW.rows={myM:[],myR:[],myS:[],foeM:[],foeR:[],foeS:[]};
   GW.weather={m:false,r:false,s:false};
   GW.myPassed=false;GW.foePassed=false;GW.myTurn=true;GW.busy=false;
   gMsgShow("Round "+GW.round+" — your move",true);
   renderGwent();
 },2000);
}
function endGwent(won,forfeit){
 $("gwentWrap").classList.remove("show");
 inGwent=false;
 if(won){
   S.gwentWins++;S.crowns+=GW.foe.reward;
   S.happy=clamp(S.happy+12,0,100);addXp(15);
   toast("🃏 Gwent victory! +"+GW.foe.reward+" crowns","gold");
   const missing=GWENT_ALL.filter(c=>!S.deck.includes(c.id));
   if(missing.length&&Math.random()<0.35){
     const c=pick(missing);S.deck.push(c.id);
     toast("🎴 Won a card: "+c.n+(c.hero?" (HERO!)":""),"gold");
   }
   geraltEmote("jump");
 }else{
   S.happy=clamp(S.happy-6,0,100);addXp(5);
   toast(forfeit?"Match forfeited.":"🃏 Lost at Gwent. «Deal again,» he mutters.");
 }
 GW=null;refreshHud();save();
}

/* =====================================================================
   BOOT
   ===================================================================== */
function startGame(state){
 S=state;
 if(S.pantryAt==null)S.pantryAt=0;
 if(S.stipendAt==null)S.stipendAt=Date.now();
 // rescue any save left starving by the old tight economy
 if(S.hunger<25){S.inv.food.milk=(S.inv.food.milk||0)+4;S.inv.food.porridge=(S.inv.food.porridge||0)+2;
   if(S.crowns<20)S.crowns=20;S.pantryAt=0;}
 $("bootScreen").style.display="none";
 offlineSim();
 refreshHud();applyStageVisuals();
 setTimeout(checkStory,900);
}
function init(){
 initWorld();
 const saved=load();
 if(saved){
   startGame(saved);
 }else{
   $("bootSub").textContent="A storm rages over Kaer Morhen. At the gate: a basket, a blanket, a white-haired infant. The Law of Surprise has been called in…";
   $("bootForm").style.display="block";
   $("startBtn").onclick=()=>{
     const n=$("nameInput").value.trim()||"Geralt";
     startGame(newState(n));
     save();
   };
 }
}
if("serviceWorker" in navigator){
 addEventListener("load",()=>{navigator.serviceWorker.register("sw.js").catch(()=>{});});
}
addEventListener("beforeunload",()=>{if(S)save();});
init();
</script>
